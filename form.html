<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Product Review Form</title>
    <meta name="description" content="Given specific field requirements, and include a submission confirmation with a counter. In addition, the form must be user friendly on both mobile and desktop screens.">
    <meta name="Author" content="Ayobami I. Akinbiyi">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <!-- Defer javascript -->
     <script src="scripts/form.js" defer></script>
</head>
<body>
    <form action="review.html" method="get">
        <fieldset>
            <legend>Product Review</legend>
    
            <!-- Product Name -->
            <label for="product">Product Name:</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
                <!-- Options will be populated via JavaScript -->
            </select>
    
            <!-- Overall Rating -->
            <label>Overall Rating:</label>
            <div class="rating">
                <label><input type="radio" name="rating" value="1" required>&#9733;</label>
                <label><input type="radio" name="rating" value="2">&#9733;&#9733;</label>
                <label><input type="radio" name="rating" value="3">&#9733;&#9733;&#9733;</label>
                <label><input type="radio" name="rating" value="4">&#9733;&#9733;&#9733;&#9733;</label>
                <label><input type="radio" name="rating" value="5">&#9733;&#9733;&#9733;&#9733;&#9733;</label>
            </div>
    
            <!-- Date of Installation -->
            <label for="installation-date">Date of Installation:</label>
            <input type="date" id="installation-date" name="installation_date" required>
    
            <!-- Useful Features -->
            <label>What will you say was a useful features in this products?</label>
            <label>(check all that apply)</label>
            <div class="features">
                <label><input type="checkbox" id="feature1" name="features" value="Feature1">Durability</label>
                <label><input type="checkbox" id="feature2" name="features" value="Feature2">Ease Of Use</label>
                <label><input type="checkbox" id="feature3" name="features" value="Feature3">Performance</label>
                <label><input type="checkbox" id="features" name="features" value="Feature4">Design</label>
            </div>
    
            <!-- Written Review -->
            <label for="review">Written Review {Optional}</label>
            <textarea id="review" name="review" rows="4" cols="50"></textarea>
    
            <!-- User Name -->
            <label for="username">Your Name {Optional}</label>
            <input type="text" id="username" name="username">
    
            <!-- Submit Button -->
            <input type="submit" value="Submit Review">
        </fieldset>
    
        <footer>
            <p>©<span id="currentyear"></span> 🤍Ayobami I. Akinbiyi 🤍 West African 🤍</p>
            <p id="lastModified"></p>
        </footer>
    </form>
</body>
</html>
